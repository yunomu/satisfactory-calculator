<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <script src="./main.js"></script>
        <title>Satisfactory recipes</title>
    </head>
    <body>
        <main id="app"></main>
<script>
    var app = Elm.Main.init({
        node: document.getElementById("app"),
        flags: {
            "recipes": "./recipes.csv",
            "items": "./items.csv"
        }
    });

        app.ports.scrollY.send(window.scrollY);
    });
</script>

</html>
